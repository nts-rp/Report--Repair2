<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Phetsarath&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <style>
    body { font-family: 'Phetsarath', sans-serif; padding: 20px; background-color: #f8f9fa; }
    .card { margin-bottom: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    .header { background: #198754; color: white; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
    #appContent { display: none; }
    #loginSection { max-width: 400px; margin: 80px auto; }
    .lang-switcher { text-align: center; margin-bottom: 15px; }
    #loader {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(4px); z-index: 9999;
      flex-direction: column; justify-content: center; align-items: center;
    }
    .row-waiting { background-color: #ffe5e5 !important; }
  </style>
</head>
<body>
<div id="loader">
  <div class="spinner-grow text-success" style="width: 3.5rem; height: 3.5rem;" role="status"></div>
  <div class="mt-3 h5 text-success fw-bold" data-i18n="processing">ກຳລັງປະມວນຜົນ...</div>
</div>

<!-- Modal ສຳລັບກັ່ນຕອງວັນທີ Export Excel -->
<div class="modal fade" id="exportModal" tabindex="-1" aria-labelledby="exportModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="exportModalLabel" data-i18n="modalExportTitle">📅 ເລືອກຊ່ວງວັນທີເພື່ອດາວໂຫຼດ Excel</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="exportForm">
          <div class="mb-3">
            <label class="form-label" data-i18n="labelStartDate">ວັນທີເລີ່ມຕົ້ນ (ວວ/ດດ/ປປປປ):</label>
            <input type="text" id="startDate" class="form-control" placeholder="dd/mm/yyyy" required>
          </div>
          <div class="mb-3">
            <label class="form-label" data-i18n="labelEndDate">ວັນທີສິ້ນສຸດ (ວວ/ດດ/ປປປປ):</label>
            <input type="text" id="endDate" class="form-control" placeholder="dd/mm/yyyy" required>
          </div>
          <div class="d-flex justify-content-end gap-2">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="btnCancel">ຍົກເລີກ</button>
            <button type="submit" class="btn btn-success" data-i18n="btnConfirmExport">ຢືນຢັນການດາວໂຫຼດ</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Login Screen -->
<div id="loginSection">
  <div class="card p-4 shadow-sm border-0">
    <h3 class="text-center mb-4 text-success" data-i18n="loginHeader">ເຂົ້າສູ່ລະບົບ (ຊ່າງ)</h3>
    <form id="loginForm">
      <div class="mb-3 text-start">
        <label class="form-label" data-i18n="labelFullName">ຊື່ ແລະ ນາມສະກຸນ:</label>
        <input type="text" id="userName" class="form-control" required>
      </div>
      <div class="lang-switcher">
        <button type="button" class="lang-btn btn btn-sm btn-outline-secondary" onclick="switchLang('lo')">🇱🇦 ລາວ</button>
        <button type="button" class="lang-btn btn btn-sm btn-outline-secondary" onclick="switchLang('en')">🇺🇸 EN</button>
      </div>
      <button type="submit" class="btn btn-success w-100" data-i18n="btnLogin">ເຂົ້າສູ່ລະບົບ</button>
    </form>
  </div>
</div>

<!-- Main Content -->
<div id="appContent" class="container">
  <div class="header text-center">
    <div class="d-flex justify-content-between align-items-center px-3">
      <div style="width: 80px;"></div>
      <h2 class="mb-0" data-i18n="appTitle">ລະບົບຊ່າງຊ້ອມແປງ</h2>
      <button class="btn btn-sm btn-outline-light" onclick="logout()" data-i18n="btnLogout">ອອກລະບົບ</button>
    </div>
    <div id="userInfoDisplay" class="mt-2 small text-light opacity-75"></div>
  </div>

  <div id="repairerMenu" class="mb-4">
    <div class="dropdown d-grid shadow-sm">
      <button class="btn btn-success dropdown-toggle fw-bold" type="button" id="filterDropdownButton" data-bs-toggle="dropdown" aria-expanded="false" data-i18n="filterAll">
        ລາຍການທັງໝົດ
      </button>
      <ul class="dropdown-menu w-100" aria-labelledby="filterDropdownButton">
        <li><a class="dropdown-item active" href="#" onclick="setFilter('all', this)" data-i18n="filterAll">ລາຍການທັງໝົດ</a></li>
        <li><a class="dropdown-item" href="#" onclick="setFilter('new', this)" id="dropdownFilterNew" data-i18n="filterNew">ລາຍການເພີ່ມໃໝ່</a></li>
        <li><a class="dropdown-item" href="#" onclick="setFilter('repairing', this)" data-i18n="filterRepairing">ກຳລັງຊ້ອມແປງ</a></li>
        <li><a class="dropdown-item" href="#" onclick="setFilter('my', this)" data-i18n="filterMyTasks">ວຽກຊ້ອມຂອງຂ້ອຍ</a></li>
        <li><a class="dropdown-item" href="#" onclick="setFilter('completed', this)" data-i18n="filterCompleted">ປະຫວັດສຳເລັດທັງໝົດ</a></li>
      </ul>
    </div>
  </div>

  <div class="mb-3 d-flex justify-content-end gap-2">
    <button class="btn btn-outline-success" onclick="exportToExcel()" data-i18n="btnExport">📥 Export Excel</button>
  </div>

  <div class="card p-4">
    <h4 data-i18n="tableHeader">📋 ລາຍການວຽກຊ້ອມແປງ</h4>
    <div class="table-responsive">
      <table class="table table-bordered table-striped text-nowrap">
        <thead class="table-dark">
          <tr>
            <th data-i18n="colSeq">ລຳດັບ</th>
            <th data-i18n="colReportId">ID</th>
            <th data-i18n="colIssue">ບັນຫາ</th>
            <th data-i18n="colLocation">ສະຖານທີ່</th>
            <th data-i18n="colDateReport">ວັນທີລາຍງານ</th>
            <th data-i18n="colReporter">ຜູ້ລາຍງານ</th>
            <th data-i18n="colDateProcess">ວັນທີດຳເນີນການ</th>
            <th data-i18n="colRepairer">ຜູ້ຊ້ອມແປງ</th>
            <th data-i18n="colStatus">ສະຖານະ</th>
            <th data-i18n="colAction">ຈັດການ</th>
          </tr>
        </thead>
        <tbody id="dataTable"></tbody>
      </table>
    </div>
    <nav aria-label="Page navigation">
      <ul class="pagination justify-content-center mt-3" id="paginationControls">
        <!-- Pagination buttons will be inserted here by JavaScript -->
      </ul>
    </nav>
  </div>
</div>

<script>
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwlsLkS_vYJu4_TcjyuHa_vmSANdQIc-SklaujGRm0DqIW-7Dmgt1x5L5rHzrv05lk/exec";
  
  const i18n = {
    lo: {
      processing: "ກຳລັງປະມວນຜົນ...", loginHeader: "ເຂົ້າສູ່ລະບົບ (ຊ່າງ)", labelFullName: "ຊື່ ແລະ ນາມສະກຸນ:",
      roleRepairer: "ຊ່າງຊ້ອມແປງ", btnLogin: "ເຂົ້າສູ່ລະບົບ", appTitle: "ລະບົບຊ່າງຊ້ອມແປງ", btnLogout: "ອອກລະບົບ",
      filterAll: "ລາຍການທັງໝົດ", filterNew: "ລາຍການເພີ່ມໃໝ່", filterRepairing: "ກຳລັງຊ້ອມແປງ",
      filterMyTasks: "ວຽກຊ້ອມຂອງຂ້ອຍ", filterCompleted: "ປະຫວັດສຳເລັດທັງໝົດ", colSeq: "ລຳດັບ", colReportId: "ID",
      tableHeader: "📋 ລາຍການວຽກຊ້ອມແປງ", colIssue: "ບັນຫາ", colLocation: "ສະຖານທີ່", colDateReport: "ວັນທີລາຍງານ",
      colReporter: "ຜູ້ລາຍງານ", colDateProcess: "ວັນທີດຳເນີນການ", colRepairer: "ຜູ້ຊ້ອມແປງ", colStatus: "ສະຖານະ", colAction: "ຈັດການ",
      statusWaiting: "ລໍຖ້າຊ້ອມແປງ", statusRepairing: "ກຳລັງຊ້ອມແປງ", statusCompleted: "ສຳເລັດແລ້ວ",
      btnAccept: "ຮັບຊ້ອມ", btnClose: "ປິດວຽກ", btnExport: "📥 ດາວໂຫລດ Excel", userLabel: "ຜູ້ໃຊ້", posLabel: "ຕຳແໜ່ງ",
      msgConfirmAccept: "ຢືນຢັນການຮັບວຽກຊ້ອມແປງ?", msgConfirmComplete: "ຢືນຢັນການປິດວຽກຊ້ອມແປງ?", 
      prevPage: "ກ່ອນໜ້າ", nextPage: "ຖັດໄປ", page: "ໜ້າ", of: "ຈາກ",
      modalExportTitle: "📅 ເລືອກຊ່ວງວັນທີເພື່ອດາວໂຫຼດ Excel", labelStartDate: "ວັນທີເລີ່ມຕົ້ນ (ວວ/ດດ/ປປປປ):", labelEndDate: "ວັນທີສິ້ນສຸດ (ວວ/ດດ/ປປປປ):", btnConfirmExport: "ຢືນຢັນການດາວໂຫຼດ", btnCancel: "ຍົກເລີກ"
    },
    en: {
      processing: "Processing...", loginHeader: "Login (Repairer)", labelFullName: "Full Name:",
      roleRepairer: "Repairer", btnLogin: "Login", appTitle: "Repairer System", btnLogout: "Logout",
      filterAll: "All Tasks", filterNew: "New Tasks", filterRepairing: "Repairing",
      filterMyTasks: "My Tasks", filterCompleted: "Completed History", colSeq: "Order", colReportId: "ID",
      tableHeader: "📋 Maintenance Tasks", colIssue: "Issue", colLocation: "Location", colDateReport: "Reported Date",
      colReporter: "Reporter", colDateProcess: "Process Date", colRepairer: "Repairer", colStatus: "Status", colAction: "Action",
      statusWaiting: "Waiting", statusRepairing: "Repairing", statusCompleted: "Completed",
      btnAccept: "Accept", btnClose: "Close", btnExport: "📥 Export Excel", userLabel: "User", posLabel: "Pos", 
      prevPage: "Previous", nextPage: "Next", page: "Page", of: "of",
      msgConfirmAccept: "Confirm Accept?", msgConfirmComplete: "Confirm Close?",
      modalExportTitle: "📅 Select Date Range", labelStartDate: "Start (dd/mm/yyyy):", labelEndDate: "End (dd/mm/yyyy):", btnConfirmExport: "Confirm", btnCancel: "Cancel"
    }
  };

  let currentUser = null;
  let currentLang = localStorage.getItem('repair_lang') || 'lo';
  let currentFilter = 'all';
  let rawData = [];
  let currentPage = 1; // ໜ້າປັດຈຸບັນ
  const itemsPerPage = 15; // ຈຳນວນລາຍການຕໍ່ໜ້າ
  let isFetching = false;

  document.addEventListener('DOMContentLoaded', () => {
    applyTranslations();
    const savedUser = localStorage.getItem('repair_system_repairer');
    if (savedUser) {
      currentUser = JSON.parse(savedUser);
      showMainContent();
      loadData(true);
    }
    setDefaultExportDates();
    setInterval(() => { if (currentUser) loadData(false); }, 5000);
  });

  function applyTranslations() {
    const langData = i18n[currentLang];
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (langData[key]) el.innerText = langData[key];
    });
  }

  function showMainContent() {
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('appContent').style.display = 'block';
    const langData = i18n[currentLang];
    document.getElementById('userInfoDisplay').innerText = `${langData.userLabel}: ${currentUser.name} | ${langData.posLabel}: ${langData.roleRepairer}`;
  }

  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    currentUser = { name: document.getElementById('userName').value, position: "ຊ່າງຊ້ອມແປງ" };
    localStorage.setItem('repair_system_repairer', JSON.stringify(currentUser));
    showMainContent();
    loadData(true);
  });

  function logout() {
    localStorage.removeItem('repair_system_repairer');
    location.reload();
  }

  function toggleLoader(show) { document.getElementById('loader').style.display = show ? 'flex' : 'none'; }

  function setFilter(filter, el) {
    currentFilter = filter;
    document.querySelectorAll('#repairerMenu .dropdown-item').forEach(item => item.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('filterDropdownButton').innerHTML = el.innerHTML;
    loadData(false);
  }

  function loadData(showSpinner = false) {
    if (isFetching) return;
    if (showSpinner) toggleLoader(true);
    isFetching = true;
    fetch(WEB_APP_URL + "?action=read")
      .then(res => res.json())
      .then(json => {
        isFetching = false;
        if (showSpinner) toggleLoader(false);
        if (json.status === 'error') return;
        
        const data = json.data.map(row => {
          const toDDMM = (str) => {
            if (!str || !str.includes('/')) return str;
            const p = str.split(' '), d = p[0].split('/');
            return d.length === 3 ? `${d[1]}/${d[0]}/${d[2]}${p[1] ? ' ' + p[1] : ''}` : str;
          };
          return row.map((val, idx) => (idx === 3 || idx === 5 || idx === 6) ? toDDMM(val) : val);
        });
        data.reverse();
        rawData = data;
        renderTable(data);
      });
  }

  function renderTable(data) {
    const langData = i18n[currentLang];
    const tbody = document.getElementById('dataTable');
    tbody.innerHTML = '';

    const newCount = data.filter(r => (r[8] || 'ລໍຖ້າຊ້ອມແປງ') === 'ລໍຖ້າຊ້ອມແປງ').length; // ຍັງຄົງນັບຈາກຂໍ້ມູນທັງໝົດ
    document.getElementById('dropdownFilterNew').innerHTML = `${langData.filterNew} ${newCount > 0 ? `<span class="badge rounded-pill bg-danger ms-2">${newCount}</span>` : ''}`;

    const startIndex = (currentPage - 1) * itemsPerPage;
    const endIndex = startIndex + itemsPerPage;
    const paginatedData = data.slice(startIndex, endIndex);

    paginatedData.forEach((row, idx) => {
      const status = row[8] || 'ລໍຖ້າຊ້ອມແປງ';
      let show = false;
      if (currentFilter === 'all') show = true;
      else if (currentFilter === 'new') show = (status === 'ລໍຖ້າຊ້ອມແປງ');
      else if (currentFilter === 'repairing') show = (status === 'ກຳລັງຊ້ອມແປງ');
      else if (currentFilter === 'my') show = (status === 'ກຳລັງຊ້ອມແປງ' && row[7] === currentUser.name);
      else if (currentFilter === 'completed') show = (status === 'ສຳເລັດແລ້ວ');
      if (!show) return;

      let stText = status === 'ລໍຖ້າຊ້ອມແປງ' ? langData.statusWaiting : (status === 'ກຳລັງຊ້ອມແປງ' ? langData.statusRepairing : langData.statusCompleted);
      const tr = document.createElement('tr');
      if (status === 'ລໍຖ້າຊ້ອມແປງ') tr.classList.add('row-waiting');
      
      let btn = '';
      if (status === 'ລໍຖ້າຊ້ອມແປງ') btn = `<button class="btn btn-sm btn-primary" onclick="updateStatus('${row[0]}', 'accept')">${langData.btnAccept}</button>`;
      else if (status === 'ກຳລັງຊ້ອມແປງ' && row[7] === currentUser.name) btn = `<button class="btn btn-sm btn-success" onclick="updateStatus('${row[0]}', 'complete')">${langData.btnClose}</button>`;
      else if (status === 'ສຳເລັດແລ້ວ') btn = `<span class="badge bg-success">${langData.statusCompleted}</span>`;

      const stClass = status === 'ລໍຖ້າຊ້ອມແປງ' ? 'text-danger' : (status === 'ກຳລັງຊ້ອມແປງ' ? 'text-warning' : 'text-success');
      tr.innerHTML = `<td>${startIndex + idx + 1}</td><td>${row[0]}</td><td>${row[1]}</td><td>${row[2]}</td><td>${row[3]}</td><td>${row[4]}</td><td>${row[6]||row[5]||'-'}</td><td>${row[7]||'-'}</td><td class="fw-bold ${stClass}">${stText}</td><td class="text-center">${btn}</td>`;
      tbody.appendChild(tr);
    });
    updatePaginationControls(data.length); // ອັບເດດປຸ່ມ Pagination
  }

  function updatePaginationControls(totalItems) {
    const totalPages = Math.ceil(totalItems / itemsPerPage);
    const paginationContainer = document.getElementById('paginationControls');
    if (!paginationContainer) return;

    paginationContainer.innerHTML = ''; // ລຶບປຸ່ມເກົ່າອອກ

    if (totalPages <= 1) {
      // ບໍ່ຈຳເປັນຕ້ອງມີ Pagination ຖ້າມີໜ້າດຽວ
      return;
    }

    const langData = i18n[currentLang];

    const prevButton = document.createElement('li');
    prevButton.className = `page-item ${currentPage === 1 ? 'disabled' : ''}`;
    prevButton.innerHTML = `<a class="page-link" href="#" onclick="prevPage(event)">${langData.prevPage}</a>`;
    paginationContainer.appendChild(prevButton);

    const pageInfo = document.createElement('li');
    pageInfo.className = 'page-item disabled';
    pageInfo.innerHTML = `<a class="page-link" href="#">${langData.page} ${currentPage} ${langData.of} ${totalPages}</a>`;
    paginationContainer.appendChild(pageInfo);

    const nextButton = document.createElement('li');
    nextButton.className = `page-item ${currentPage === totalPages ? 'disabled' : ''}`;
    nextButton.innerHTML = `<a class="page-link" href="#" onclick="nextPage(event)">${langData.nextPage}</a>`;
    paginationContainer.appendChild(nextButton);
  }

  function nextPage(event) {
    event.preventDefault();
    const totalItems = rawData.length;
    const totalPages = Math.ceil(totalItems / itemsPerPage);
    if (currentPage < totalPages) {
      currentPage++;
      renderTable(rawData);
    }
  }

  function prevPage(event) {
    event.preventDefault();
    if (currentPage > 1) {
      currentPage--;
      renderTable(rawData);
    }
  }

  function updateStatus(id, action) {
    const msg = action === 'accept' ? i18n[currentLang].msgConfirmAccept : i18n[currentLang].msgConfirmComplete;
    if (!confirm(msg)) return;
    toggleLoader(true);
    fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'update', id, repairer: currentUser.name, statusAction: action })})
      .then(res => res.json()).then(d => { toggleLoader(false); loadData(); });
  }

  function switchLang(lang) {
    currentLang = lang; localStorage.setItem('repair_lang', lang);
    applyTranslations(); if (currentUser) showMainContent(); loadData();
  }

  function setDefaultExportDates() {
    const t = new Date(), l = new Date(); l.setDate(t.getDate() - 7);
    const f = (d) => String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear();
    document.getElementById('startDate').value = f(l); document.getElementById('endDate').value = f(t);
  }

  function exportToExcel() { new bootstrap.Modal(document.getElementById('exportModal')).show(); }
  document.getElementById('exportForm').addEventListener('submit', e => { e.preventDefault(); confirmExport(); });

  function confirmExport() {
    const sVal = document.getElementById('startDate').value, eVal = document.getElementById('endDate').value;
    const parse = (str) => {
      const p = str.split(' ')[0].split('/');
      return new Date(p[2], p[1]-1, p[0]);
    };
    const s = parse(sVal); s.setHours(0,0,0,0);
    const e = parse(eVal); e.setHours(23,59,59,999);
    const filtered = rawData.filter(r => { const d = parse(r[3]); return d >= s && d <= e; });
    if (filtered.length === 0) return alert("No data");

    const ld = i18n[currentLang];
    const h = [ld.colReportId, ld.colIssue, ld.colLocation, ld.colDateReport, ld.colReporter, ld.colDateProcess, ld.colRepairer, ld.colStatus];
    const ed = filtered.map(r => {
      const st = r[8] || 'ລໍຖ້າຊ້ອມແປງ';
      let tst = st === 'ລໍຖ້າຊ້ອມແປງ' ? ld.statusWaiting : (st === 'ກຳລັງຊ້ອມແປງ' ? ld.statusRepairing : ld.statusCompleted);
      return [r[0], r[1], r[2], r[3], r[4], st === 'ສຳເລັດແລ້ວ' ? r[6] : (st === 'ກຳລັງຊ້ອມແປງ' ? r[5] : ''), r[7], tst];
    });
    const ws = XLSX.utils.aoa_to_sheet([h, ...ed]), wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Reports");
    XLSX.writeFile(wb, `Repair_Report_${sVal.replace(/\//g,'-')}.xlsx`);
    bootstrap.Modal.getInstance(document.getElementById('exportModal')).hide();
  }
</script>
